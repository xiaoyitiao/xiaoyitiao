# 开发/演示环境配置：使用 H2 内存数据库，方便快速体验
spring:
  datasource:
    url: jdbc:h2:mem:zhiyaoban;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

# 开发环境允许所有跨域，方便本地联调
zhiyaoban:
  jwt:
    secret: ${JWT_SECRET:zhiyaoban-dev-secret-key-at-least-32-characters-long}
  sms:
    mock: true
    fixed-code: 123456
  push:
    platform: mock
